<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR коды для столов</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0ede6; padding: 24px 16px; color: #1a1a18; }
  .wrap { max-width: 900px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 6px; }
  .subtitle { font-size: 14px; color: #5f5e5a; margin-bottom: 24px; }
  .url-box { display: flex; gap: 10px; margin-bottom: 28px; flex-wrap: wrap; align-items: center; }
  .url-box input { flex: 1; min-width: 240px; padding: 12px 16px; font-size: 14px; border: 1px solid rgba(0,0,0,0.22); border-radius: 10px; background: #fff; font-family: inherit; outline: none; }
  .url-box input:focus { border-color: #1a7a4a; }
  .url-box button { padding: 12px 20px; background: #1a7a4a; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .qr-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 14px; padding: 20px 16px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .table-label { font-size: 11px; color: #888; letter-spacing: 1.5px; text-transform: uppercase; }
  .table-num { font-size: 28px; font-weight: 500; color: #1a1a18; line-height: 1; }
  .qr-img { width: 160px; height: 160px; }
  .scan-hint { font-size: 11px; color: #888; }
  .print-btn { display: block; width: 100%; max-width: 300px; margin: 0 auto 12px; padding: 14px; background: #1a7a4a; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .hint { font-size: 13px; color: #888; text-align: center; margin-bottom: 32px; }
  @media print {
    body { background: #fff; padding: 0; }
    .no-print { display: none !important; }
    .grid { grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .qr-card { border: 1px solid #ddd; break-inside: avoid; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="no-print">
    <h1>QR коды для столов</h1>
    <p class="subtitle">Адрес уже установлен — нажмите "Сгенерировать"</p>
    <div class="url-box">
      <input type="text" id="base-url" value="https://0101kh.github.io/restaurant-app/guest.html" />
      <button onclick="generateAll()">Сгенерировать</button>
    </div>
  </div>
  <div id="grid" class="grid"></div>
  <div class="no-print" id="print-section" style="display:none;">
    <button class="print-btn" onclick="window.print()">🖨️ Распечатать все QR коды</button>
    <p class="hint">После печати вырежьте и поставьте на столики</p>
  </div>
</div>
<script>
const TABLES = 15;
function generateAll() {
  const baseUrl = document.getElementById('base-url').value.trim().replace(/\/$/, '');
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let i = 1; i <= TABLES; i++) {
    const url = baseUrl + '?table=' + i;
    const imgSrc = 'https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=' + encodeURIComponent(url);
    const card = document.createElement('div');
    card.className = 'qr-card';
    card.innerHTML = `<div class="table-label">Стол</div><div class="table-num">${i}</div><img class="qr-img" src="${imgSrc}" alt="QR стол ${i}" /><div class="scan-hint">Отсканируйте для заказа</div>`;
    grid.appendChild(card);
  }
  document.getElementById('print-section').style.display = 'block';
}
generateAll();
</script>
</body>
</html>
