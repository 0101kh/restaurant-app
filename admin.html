<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Управление меню</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.3.0/dist/tabler-icons.min.css">
<style>
* { box-sizing:border-box;margin:0;padding:0; }
:root { --acc:#1a7a4a;--acc-bg:#d4ede0;--acc-dk:#145e38;--bg:#fff;--bg2:#f5f5f3;--txt:#1a1a18;--txt2:#5f5e5a;--txt3:#888780;--bdr:rgba(0,0,0,0.12);--bdr2:rgba(0,0,0,0.22);--r:14px;--rm:8px; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#eeecea;min-height:100vh;color:var(--txt); }
.wrap { max-width:760px;margin:0 auto;padding:24px 16px 80px; }
input,select,textarea { width:100%;padding:12px 14px;font-size:14px;border:1px solid var(--bdr2);border-radius:var(--rm);background:var(--bg);color:var(--txt);outline:none;font-family:inherit; }
input:focus,select:focus,textarea:focus { border-color:var(--acc); }
textarea { resize:vertical;min-height:80px; }
.btn-main { padding:12px 20px;background:var(--acc);color:#fff;border:none;border-radius:var(--rm);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px; }
.btn-sec { padding:10px 16px;background:var(--bg2);color:var(--txt2);border:1px solid var(--bdr2);border-radius:var(--rm);font-size:13px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px; }
.btn-danger { padding:10px 16px;background:#FCEBEB;color:#A32D2D;border:1px solid #F7C1C1;border-radius:var(--rm);font-size:13px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px; }
.card { background:var(--bg);border:0.5px solid var(--bdr);border-radius:var(--r);padding:16px; }
.badge { display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500; }
.toggle{position:relative;width:44px;height:24px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:var(--bdr2);border-radius:24px;cursor:pointer;transition:0.2s;}
.toggle input:checked+.toggle-slider{background:var(--acc);}
.toggle-slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:white;border-radius:50%;transition:0.2s;}
.toggle input:checked+.toggle-slider:before{transform:translateX(20px);}
.upload-zone{border:2px dashed var(--bdr2);border-radius:var(--rm);padding:20px;text-align:center;cursor:pointer;transition:border-color 0.2s;}
.upload-zone:hover{border-color:var(--acc);}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center;padding:16px;}
.overlay.active{display:flex;}
.modal{background:var(--bg);border-radius:var(--r);padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.cat-pill{padding:8px 16px;border-radius:20px;border:1px solid var(--bdr2);background:transparent;color:var(--txt2);font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;}
.cat-pill.active{background:var(--acc);color:#fff;border-color:var(--acc);}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;}
</style>
</head>
<body>
<div class="wrap">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
    <div>
      <div style="font-size:11px;color:var(--txt3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;">Панель управления</div>
      <h1 style="font-size:22px;font-weight:500;">Меню ресторана</h1>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn-sec" onclick="openCatModal()"><i class="ti ti-category"></i> Категории</button>
      <button class="btn-main" onclick="openModal()"><i class="ti ti-plus"></i> Добавить блюдо</button>
    </div>
  </div>

  <!-- Категории фильтр -->
  <div id="cat-filter" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;"></div>

  <div id="menu-list" style="display:flex;flex-direction:column;gap:12px;"></div>
</div>

<!-- Модал: блюдо -->
<div class="overlay" id="modal">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <h2 style="font-size:18px;font-weight:500;" id="modal-title">Новое блюдо</h2>
      <button onclick="closeModal()" style="background:none;border:none;cursor:pointer;font-size:20px;color:var(--txt3);">✕</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:14px;">
      <!-- Фото -->
      <div>
        <div style="font-size:13px;color:var(--txt2);margin-bottom:6px;">Фото блюда</div>
        <div class="upload-zone" onclick="document.getElementById('photo-input').click()" id="upload-zone">
          <div id="upload-preview">
            <i class="ti ti-photo" style="font-size:32px;color:var(--txt3);display:block;margin-bottom:8px;"></i>
            <div style="font-size:13px;color:var(--txt3);">Нажмите чтобы загрузить фото</div>
            <div style="font-size:11px;color:var(--txt3);margin-top:4px;">JPG, PNG до 5 МБ</div>
          </div>
        </div>
        <input type="file" id="photo-input" accept="image/*" style="display:none;" onchange="previewPhoto(this)">
        <div style="margin-top:8px;">
          <div style="font-size:12px;color:var(--txt3);margin-bottom:4px;">Или вставьте URL фото:</div>
          <input type="text" id="f-image-url" placeholder="https://..." oninput="previewFromUrl(this.value)" />
        </div>
      </div>
      <div><div style="font-size:13px;color:var(--txt2);margin-bottom:6px;">Название *</div><input type="text" id="f-name" placeholder="Шашлык из баранины" /></div>
      <div><div style="font-size:13px;color:var(--txt2);margin-bottom:6px;">Описание</div><textarea id="f-desc" placeholder="Состав, способ приготовления..."></textarea></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div><div style="font-size:13px;color:var(--txt2);margin-bottom:6px;">Цена (₽) *</div><input type="number" id="f-price" placeholder="450" /></div>
        <div><div style="font-size:13px;color:var(--txt2);margin-bottom:6px;">Время готовки</div><input type="text" id="f-time" placeholder="20 мин" /></div>
      </div>
      <div><div style="font-size:13px;color:var(--txt2);margin-bottom:6px;">Категория *</div><select id="f-cat"></select></div>
      <div style="display:flex;gap:10px;margin-top:8px;">
        <button class="btn-main" id="save-btn" onclick="saveItem()" style="flex:1;"><i class="ti ti-check"></i> Сохранить</button>
        <button class="btn-sec" onclick="closeModal()">Отмена</button>
      </div>
    </div>
  </div>
</div>

<!-- Модал: категории -->
<div class="overlay" id="cat-modal">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <h2 style="font-size:18px;font-weight:500;">Категории</h2>
      <button onclick="closeCatModal()" style="background:none;border:none;cursor:pointer;font-size:20px;color:var(--txt3);">✕</button>
    </div>
    <div id="cat-list" style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;"></div>
    <div style="display:flex;gap:8px;">
      <input type="text" id="new-cat-name" placeholder="Название категории" style="flex:1;" />
      <input type="text" id="new-cat-emoji" placeholder="🍕" style="width:60px;" />
      <button class="btn-main" onclick="addCategory()"><i class="ti ti-plus"></i></button>
    </div>
    <div style="font-size:12px;color:var(--txt3);margin-top:8px;">Введите название и эмодзи для новой категории</div>
  </div>
</div>

<script>
const API = 'https://restaurant-api-production-4fdd.up.railway.app';
const GITHUB_USER = '0101kh';
const GITHUB_REPO = 'restaurant-app';
const IMAGES_PATH = 'images';

// Категории хранятся в localStorage
let categories = JSON.parse(localStorage.getItem('menu_categories') || 'null') || [
  {id:'hot', name:'Горячее', emoji:'🔥'},
  {id:'salads', name:'Салаты', emoji:'🥗'},
  {id:'soups', name:'Супы', emoji:'🍲'},
  {id:'drinks', name:'Напитки', emoji:'🥤'}
];

function saveCategories() { localStorage.setItem('menu_categories', JSON.stringify(categories)); }

let items=[], currentCat='all', editingId=null, pendingPhotoFile=null, pendingPhotoUrl=null;

function getCatLabel(id) {
  const c = categories.find(c=>c.id===id);
  return c ? c.emoji+' '+c.name : id;
}

function getCatColor(id) {
  const colors = ['#FAEEDA','#EAF3DE','#E6F1FB','#d4ede0','#F3E5F5','#E3F2FD','#FFF3E0','#F1F8E9'];
  const textColors = ['#854F0B','#3B6D11','#185FA5','#145e38','#6A1B9A','#0D47A1','#E65100','#33691E'];
  const idx = categories.findIndex(c=>c.id===id) % colors.length;
  return {bg: colors[idx], color: textColors[idx]};
}

async function loadMenu() {
  const res=await fetch(API+'/api/menu/all');
  items=await res.json();
  renderFilter();
  render();
}

function renderFilter() {
  const el=document.getElementById('cat-filter');
  el.innerHTML=`<button class="cat-pill ${currentCat==='all'?'active':''}" onclick="filterCat(this,'all')">Все</button>`
    + categories.map(c=>`<button class="cat-pill ${currentCat===c.id?'active':''}" onclick="filterCat(this,'${c.id}')">${c.emoji} ${c.name}</button>`).join('');
}

function filterCat(btn, cat) {
  currentCat=cat;
  document.querySelectorAll('.cat-pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const filtered=currentCat==='all'?items:items.filter(i=>i.category===currentCat);
  const el=document.getElementById('menu-list');
  if(!filtered.length){el.innerHTML='<div style="text-align:center;padding:48px 0;color:var(--txt3);">Нет блюд</div>';return;}
  el.innerHTML=filtered.map(item=>{
    const clr=getCatColor(item.category);
    return `<div class="card" style="opacity:${item.available?1:0.55};">
      <div style="display:flex;gap:14px;align-items:flex-start;">
        ${item.image_url
          ?`<img src="${item.image_url}" style="width:80px;height:80px;object-fit:cover;border-radius:var(--rm);flex-shrink:0;" />`
          :`<div style="width:80px;height:80px;background:var(--bg2);border-radius:var(--rm);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i class="ti ti-photo" style="font-size:28px;color:var(--txt3);"></i></div>`}
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px;">
            <div style="font-size:15px;font-weight:500;">${item.name}</div>
            <span class="badge" style="background:${clr.bg};color:${clr.color};">${getCatLabel(item.category)}</span>
            ${!item.available?'<span class="badge" style="background:#f5f5f3;color:#888;">Скрыто</span>':''}
          </div>
          ${item.description?`<div style="font-size:12px;color:var(--txt3);margin-bottom:6px;line-height:1.4;">${item.description}</div>`:''}
          <div style="display:flex;align-items:center;gap:12px;">
            <span style="font-size:16px;font-weight:500;color:var(--acc);">${item.price} ₽</span>
            <span style="font-size:12px;color:var(--txt3);"><i class="ti ti-clock" style="font-size:12px;"></i> ${item.cook_time||'—'}</span>
          </div>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px;border-top:0.5px solid var(--bdr);padding-top:12px;flex-wrap:wrap;align-items:center;">
        <button class="btn-sec" onclick="editItem('${item.id}')"><i class="ti ti-edit"></i> Редактировать</button>
        <label class="toggle" style="margin-left:auto;" title="${item.available?'Скрыть':'Показать'}">
          <input type="checkbox" ${item.available?'checked':''} onchange="toggleAvailable('${item.id}',this.checked)">
          <span class="toggle-slider"></span>
        </label>
        <button class="btn-danger" onclick="deleteItem('${item.id}')"><i class="ti ti-trash"></i></button>
      </div>
    </div>`;
  }).join('');
}

function updateCatSelect() {
  const sel=document.getElementById('f-cat');
  sel.innerHTML=categories.map(c=>`<option value="${c.id}">${c.emoji} ${c.name}</option>`).join('');
}

function openModal(item=null) {
  editingId=item?item.id:null;
  pendingPhotoFile=null;pendingPhotoUrl=null;
  document.getElementById('modal-title').textContent=item?'Редактировать блюдо':'Новое блюдо';
  document.getElementById('f-name').value=item?.name||'';
  document.getElementById('f-desc').value=item?.description||'';
  document.getElementById('f-price').value=item?.price||'';
  document.getElementById('f-time').value=item?.cook_time||'';
  document.getElementById('f-image-url').value=item?.image_url||'';
  updateCatSelect();
  if(item?.category) document.getElementById('f-cat').value=item.category;
  document.getElementById('upload-preview').innerHTML=item?.image_url
    ?`<img src="${item.image_url}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;margin-bottom:8px;" /><div style="font-size:12px;color:var(--txt3);">Нажмите чтобы заменить</div>`
    :`<i class="ti ti-photo" style="font-size:32px;color:var(--txt3);display:block;margin-bottom:8px;"></i><div style="font-size:13px;color:var(--txt3);">Нажмите чтобы загрузить фото</div><div style="font-size:11px;color:var(--txt3);margin-top:4px;">JPG, PNG до 5 МБ</div>`;
  document.getElementById('modal').classList.add('active');
}

function closeModal(){document.getElementById('modal').classList.remove('active');}

function previewPhoto(input) {
  const file=input.files[0];if(!file)return;
  pendingPhotoFile=file;pendingPhotoUrl=null;
  document.getElementById('f-image-url').value='';
  const url=URL.createObjectURL(file);
  document.getElementById('upload-preview').innerHTML=`<img src="${url}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;margin-bottom:8px;" /><div style="font-size:12px;color:var(--acc);">Фото выбрано</div>`;
}

function previewFromUrl(url) {
  if(!url) return;
  pendingPhotoUrl=url;pendingPhotoFile=null;
  document.getElementById('upload-preview').innerHTML=`<img src="${url}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;margin-bottom:8px;" onerror="this.style.display='none'" /><div style="font-size:12px;color:var(--acc);">URL установлен</div>`;
}

async function uploadToGitHub(file) {
  const GITHUB_TOKEN = localStorage.getItem('github_token');
  if(!GITHUB_TOKEN) {
    const token = prompt('Введите GitHub Personal Access Token для загрузки фото:\n\n(github.com → Settings → Developer settings → Personal access tokens → Generate new token → выбери "repo")');
    if(!token) return null;
    localStorage.setItem('github_token', token);
  }
  const tok = localStorage.getItem('github_token');
  const reader = new FileReader();
  const b64 = await new Promise(res=>{reader.onload=e=>res(e.target.result.split(',')[1]);reader.readAsDataURL(file);});
  const fname = Date.now()+'.'+file.name.split('.').pop();
  const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${IMAGES_PATH}/${fname}`, {
    method:'PUT',
    headers:{'Authorization':'token '+tok,'Content-Type':'application/json'},
    body:JSON.stringify({message:'Upload image '+fname,content:b64})
  });
  if(!res.ok) {
    localStorage.removeItem('github_token');
    alert('Ошибка загрузки. Проверьте токен.');
    return null;
  }
  return `https://${GITHUB_USER}.github.io/${GITHUB_REPO}/${IMAGES_PATH}/${fname}`;
}

async function saveItem() {
  const name=document.getElementById('f-name').value.trim();
  const price=parseInt(document.getElementById('f-price').value);
  const cat=document.getElementById('f-cat').value;
  if(!name||!price||!cat){alert('Заполните обязательные поля');return;}

  const btn=document.getElementById('save-btn');
  btn.disabled=true;btn.innerHTML='<div class="spinner"></div> Сохраняем...';

  let image_url = document.getElementById('f-image-url').value.trim() || (editingId?items.find(i=>i.id===editingId)?.image_url:null);

  if(pendingPhotoFile) {
    btn.innerHTML='<div class="spinner"></div> Загружаем фото...';
    const uploaded = await uploadToGitHub(pendingPhotoFile);
    if(uploaded) image_url=uploaded;
  } else if(pendingPhotoUrl) {
    image_url=pendingPhotoUrl;
  }

  const payload={name,description:document.getElementById('f-desc').value.trim(),price,category:cat,cook_time:document.getElementById('f-time').value.trim()||'15 мин',image_url:image_url||null,available:true};

  if(editingId){
    const existing=items.find(i=>i.id===editingId);
    payload.available=existing?.available!==undefined?existing.available:true;
    await fetch(API+'/api/menu/'+editingId,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  } else {
    await fetch(API+'/api/menu',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  }

  closeModal();await loadMenu();
  btn.disabled=false;btn.innerHTML='<i class="ti ti-check"></i> Сохранить';
}

function editItem(id){const item=items.find(i=>i.id===id);if(item)openModal(item);}
async function toggleAvailable(id,val){
  const item=items.find(i=>i.id===id);if(!item)return;
  await fetch(API+'/api/menu/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({...item,available:val})});
  await loadMenu();
}
async function deleteItem(id){if(!confirm('Удалить блюдо?'))return;await fetch(API+'/api/menu/'+id,{method:'DELETE'});await loadMenu();}

// КАТЕГОРИИ
function openCatModal() {
  renderCatList();
  document.getElementById('cat-modal').classList.add('active');
}
function closeCatModal(){document.getElementById('cat-modal').classList.remove('active');}

function renderCatList() {
  document.getElementById('cat-list').innerHTML=categories.map((c,idx)=>`
    <div style="display:flex;align-items:center;gap:8px;padding:10px;background:var(--bg2);border-radius:var(--rm);">
      <span style="font-size:20px;">${c.emoji}</span>
      <span style="flex:1;font-size:14px;font-weight:500;">${c.name}</span>
      <span style="font-size:12px;color:var(--txt3);">${items.filter(i=>i.category===c.id).length} блюд</span>
      ${idx>=4?`<button onclick="removeCategory('${c.id}')" style="background:none;border:none;cursor:pointer;color:#A32D2D;font-size:16px;">✕</button>`:''}
    </div>
  `).join('');
}

function addCategory() {
  const name=document.getElementById('new-cat-name').value.trim();
  const emoji=document.getElementById('new-cat-emoji').value.trim()||'🍽️';
  if(!name){alert('Введите название');return;}
  const id=name.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'')+'_'+Date.now();
  categories.push({id,name,emoji});
  saveCategories();
  document.getElementById('new-cat-name').value='';
  document.getElementById('new-cat-emoji').value='';
  renderCatList();
  renderFilter();
  updateCatSelect();
}

function removeCategory(id) {
  const count=items.filter(i=>i.category===id).length;
  if(count>0){alert(`Нельзя удалить — в категории ${count} блюд`);return;}
  if(!confirm('Удалить категорию?'))return;
  categories=categories.filter(c=>c.id!==id);
  saveCategories();
  renderCatList();
  renderFilter();
}

loadMenu();
</script>
</body>
</html>
