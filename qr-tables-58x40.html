<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>QR коды 58x40мм</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0ede6; padding: 24px 16px; color: #1a1a18; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: #5f5e5a; margin-bottom: 20px; }
  .controls { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
  .controls input { flex: 1; min-width: 200px; padding: 10px 14px; font-size: 13px; border: 1px solid rgba(0,0,0,0.22); border-radius: 8px; background: #fff; font-family: inherit; outline: none; }
  .controls button { padding: 10px 18px; background: #1D9E75; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .print-btn { padding: 12px 24px; background: #1a1a18; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; margin-bottom: 8px; }
  .hint { font-size: 12px; color: #888; margin-bottom: 24px; }

  /* Превью на экране */
  .preview-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 32px; }
  .label-preview { background: #fff; border: 1px solid rgba(0,0,0,0.15); border-radius: 6px; width: 174px; height: 120px; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 8px; flex-shrink: 0; }
  .label-preview img { width: 90px; height: 90px; }
  .label-text { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
  .label-text .lbl { font-size: 9px; color: #888; letter-spacing: 1px; text-transform: uppercase; }
  .label-text .num { font-size: 26px; font-weight: 600; color: #1a1a18; line-height: 1; }
  .label-text .hint2 { font-size: 8px; color: #aaa; text-align: center; line-height: 1.3; }

  /* Печать — точный размер 58x40мм */
  @media print {
    @page { size: 58mm 40mm; margin: 0; }
    body { background: #fff; padding: 0; margin: 0; }
    .no-print { display: none !important; }
    .preview-grid { display: block; margin: 0; padding: 0; gap: 0; }

    .label-preview {
      width: 58mm;
      height: 40mm;
      border: none;
      border-radius: 0;
      page-break-after: always;
      break-after: page;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4mm;
      padding: 2mm;
      margin: 0;
    }
    .label-preview img { width: 30mm; height: 30mm; }
    .label-text .lbl { font-size: 7pt; }
    .label-text .num { font-size: 22pt; }
    .label-text .hint2 { font-size: 6pt; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="no-print">
    <h1>QR коды для термопринтера</h1>
    <p class="subtitle">Размер этикетки: 58 × 40 мм — каждый QR код печатается на отдельной этикетке</p>
    <div class="controls">
      <input type="text" id="base-url" value="https://splendid-churros-dc4254.netlify.app/guest.html" />
      <button onclick="generateAll()">Сгенерировать</button>
    </div>
    <button class="print-btn" onclick="window.print()">🖨️ Печать на термопринтере</button>
    <p class="hint">В настройках печати выбери: размер бумаги 58×40мм, без полей, термопринтер</p>
  </div>

  <div id="grid" class="preview-grid"></div>
</div>

<script>
function generateAll() {
  const baseUrl = document.getElementById('base-url').value.trim().replace(/\/$/, '');
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  for (let i = 1; i <= 15; i++) {
    const url = baseUrl + '?table=' + i;
    const imgSrc = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&margin=2&data=' + encodeURIComponent(url);

    const card = document.createElement('div');
    card.className = 'label-preview';
    card.innerHTML = `
      <img src="${imgSrc}" alt="QR стол ${i}" />
      <div class="label-text">
        <div class="lbl">Стол</div>
        <div class="num">${i}</div>
        <div class="hint2">Сканируй<br>для заказа</div>
      </div>
    `;
    grid.appendChild(card);
  }
}

generateAll();
</script>
</body>
</html>
