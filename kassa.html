<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Касса · Sufra</title>
<style>
  :root{
    --bg:#f3f4f1; --card:#fff; --ink:#1c2a22; --muted:#7d8a82; --line:rgba(0,0,0,0.08);
    --green:#1a7a4a; --green-bg:#e8f3ed; --amber:#e0a23c; --blue:#185FA5; --red:#bb4233;
    --body:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;padding:0 16px 80px}

  /* PIN */
  #pin-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
  #pin-screen h1{font-size:24px;font-weight:600;margin-bottom:6px}
  #pin-screen p{color:var(--muted);font-size:14px;margin-bottom:22px}
  #pin-input{width:200px;text-align:center;font-size:24px;letter-spacing:8px;padding:14px;border:1px solid var(--line);border-radius:12px;font-family:inherit;margin-bottom:14px}
  .btn-main{background:var(--green);color:#fff;border:none;border-radius:12px;padding:14px 28px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
  #pin-err{color:var(--red);font-size:13px;margin-top:10px;display:none}

  header{position:sticky;top:0;z-index:10;background:rgba(243,244,241,0.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .head-in{max-width:760px;margin:0 auto;padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
  .head-in h1{font-size:20px;font-weight:600}
  .live{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--green)}
  .live i{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 1.6s infinite}
  .live.off i{background:#c0392b;box-shadow:none;animation:none}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  .section-title{font-size:13px;letter-spacing:.5px;color:var(--muted);font-weight:600;margin:22px 2px 12px;text-transform:uppercase}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px}
  .card.pending{border:2px solid var(--amber)}
  .row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .tbl{font-size:16px;font-weight:600}
  .meta{font-size:13px;color:var(--muted);margin-top:3px}
  .total{font-size:18px;font-weight:700;color:var(--green);white-space:nowrap}
  .items{font-size:13px;color:var(--muted);margin-top:10px;line-height:1.7}
  .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
  .btn{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:600;padding:11px 16px;border-radius:10px;cursor:pointer;border:1px solid transparent;font-family:inherit;text-decoration:none}
  .btn-confirm{background:var(--green);color:#fff;flex:1;justify-content:center}
  .btn-receipt{background:#E6F1FB;color:var(--blue);border-color:var(--blue)}
  .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;background:var(--green-bg);color:var(--green)}
  .empty{color:var(--muted);font-size:14px;padding:18px 2px}
  .thumb{width:54px;height:54px;border-radius:8px;object-fit:cover;border:1px solid var(--line)}
  .toast{position:fixed;bottom:20px;left:16px;right:16px;max-width:728px;margin:0 auto;background:var(--ink);color:#fff;padding:14px 16px;border-radius:12px;font-size:14px;z-index:50;display:none;animation:up .3s ease}
  @keyframes up{from{transform:translateY(16px);opacity:0}to{transform:none;opacity:1}}
</style>
</head>
<body>

<!-- PIN -->
<div id="pin-screen">
  <h1>🧾 Касса</h1>
  <p>Введите PIN кассира</p>
  <input id="pin-input" type="password" inputmode="numeric" maxlength="6" placeholder="••••" />
  <div><button class="btn-main" onclick="checkPin()">Войти</button></div>
  <div id="pin-err">Неверный PIN</div>
</div>

<!-- MAIN -->
<div id="main" style="display:none;">
  <header>
    <div class="head-in">
      <h1>🧾 Касса</h1>
      <span class="live" id="live"><i></i><span id="live-text">онлайн</span></span>
    </div>
  </header>
  <div class="wrap">
    <div class="section-title">💳 Ожидают оплаты</div>
    <div id="pending-list"></div>
    <div class="section-title">Открытые столы</div>
    <div id="tables-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = 'https://restaurant-api-production-4fdd.up.railway.app';
  const WS_URL = 'wss://restaurant-api-production-4fdd.up.railway.app';
  const KASSA_PIN = '1111';   // <-- PIN кассира (меняй здесь)

  function checkPin(){
    const v = document.getElementById('pin-input').value.trim();
    if(v === KASSA_PIN){
      document.getElementById('pin-screen').style.display='none';
      document.getElementById('main').style.display='block';
      loadKassa();
      connectWS();
    } else {
      document.getElementById('pin-err').style.display='block';
    }
  }
  document.getElementById('pin-input').addEventListener('keydown', e=>{ if(e.key==='Enter') checkPin(); });

  function money(n){ return (n||0).toLocaleString('ru') + ' \u20bd'; }
  function sessionTotal(s){ return (s.orders||[]).reduce((acc,o)=>acc+(o.items||[]).reduce((a,i)=>a+i.price*(i.qty||1),0),0); }
  function sessionItems(s){
    const arr=[]; (s.orders||[]).forEach(o=>(o.items||[]).forEach(i=>arr.push(i.name+(i.qty>1?' \u00d7'+i.qty:''))));
    return arr.join(', ');
  }
  function sessionGuests(s){
    const names=[...new Set((s.orders||[]).map(o=>o.guest_name_display||o.guest_name).filter(Boolean))];
    return names.join(', ');
  }
  function receiptOrder(s){ return (s.orders||[]).find(o=>o.payment_receipt); }

  async function loadKassa(){
    try{
      const res = await fetch(API+'/api/sessions/open');
      let sessions = await res.json();
      sessions = (sessions||[]).filter(s=>(s.orders||[]).length);

      const pending = sessions.filter(s=>s.payment_status==='requested');
      const pEl = document.getElementById('pending-list');
      pEl.innerHTML = pending.length ? pending.map(s=>{
        const ro = receiptOrder(s);
        const receiptBtn = ro
          ? `<a class="btn btn-receipt" href="${API+'/api/receipt/'+ro.id}" target="_blank" rel="noopener">🧾 Чек</a>`
          : `<span style="font-size:12px;color:var(--muted);align-self:center;">Чек не прикреплён</span>`;
        const thumb = ro ? `<img class="thumb" src="${ro.payment_receipt}" />` : '';
        return `<div class="card pending">
          <div class="row">
            <div style="display:flex;gap:12px;">
              ${thumb}
              <div>
                <div class="tbl">Стол ${s.table_number}</div>
                <div class="meta">${sessionGuests(s)||'—'}</div>
              </div>
            </div>
            <div class="total">${money(sessionTotal(s))}</div>
          </div>
          <div class="items">${sessionItems(s)}</div>
          <div class="actions">
            ${receiptBtn}
            <button class="btn btn-confirm" onclick="confirmPayment('${s.id}','${s.table_number}')">✓ Подтвердить оплату</button>
          </div>
        </div>`;
      }).join('') : '<div class="empty">Нет заказов, ожидающих оплаты</div>';

      const tEl = document.getElementById('tables-list');
      tEl.innerHTML = sessions.length ? sessions.map(s=>{
        const waiting = s.payment_status==='requested';
        return `<div class="card">
          <div class="row">
            <div>
              <div class="tbl">Стол ${s.table_number} ${waiting?'<span class="badge" style="background:#fbe6cf;color:#a8741f;">оплата</span>':''}</div>
              <div class="meta">${sessionGuests(s)||'—'} · ${(s.orders||[]).length} зак.</div>
            </div>
            <div class="total">${money(sessionTotal(s))}</div>
          </div>
          <div class="items">${sessionItems(s)}</div>
        </div>`;
      }).join('') : '<div class="empty">Открытых столов нет</div>';
    }catch(e){ console.error(e); }
  }

  async function confirmPayment(sessionId, tableNum){
    if(!confirm('Подтвердить оплату стола '+tableNum+' и закрыть его?')) return;
    try{
      await fetch(API+'/api/payment/confirm', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ session_id: sessionId })
      });
      await fetch(API+'/api/sessions/'+sessionId+'/close', { method:'PUT' });
      showToast('✅ Оплата подтверждена · Стол '+tableNum+' закрыт');
      loadKassa();
    }catch(e){ console.error(e); showToast('Ошибка. Попробуйте снова'); }
  }

  let toastTimer=null;
  function showToast(t){
    const el=document.getElementById('toast'); el.textContent=t; el.style.display='block';
    clearTimeout(toastTimer); toastTimer=setTimeout(()=>{ el.style.display='none'; }, 3500);
  }

  let ws=null, reloadTimer=null;
  function reloadSoon(){ clearTimeout(reloadTimer); reloadTimer=setTimeout(loadKassa, 400); }
  function setLive(on){
    const l=document.getElementById('live'); l.classList.toggle('off', !on);
    document.getElementById('live-text').textContent = on ? 'онлайн' : 'нет связи';
  }
  function connectWS(){
    if(ws) return;
    ws = new WebSocket(WS_URL);
    ws.onopen = ()=> setLive(true);
    ws.onmessage = (e)=>{
      try{
        const msg = JSON.parse(e.data);
        if(['payment_requested','payment_confirmed','session_closed','new_order','order_updated'].includes(msg.type)){
          reloadSoon();
          if(msg.type==='payment_requested') showToast('💳 Новый запрос оплаты · Стол '+msg.table_number);
        }
      }catch(err){}
    };
    ws.onclose = ()=>{ ws=null; setLive(false); setTimeout(connectWS, 3000); };
  }
</script>
</body>
</html>
